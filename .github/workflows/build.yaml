name: Font Build Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-font:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load glyph configuration
        run: cat glyph.yaml

      - name: Validate glyph coverage
        run: python scripts/validate_glyphs.py --config glyph.yaml

      - name: Build font
        run: python scripts/build_font.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: font-build
          path: build/fonts/*
